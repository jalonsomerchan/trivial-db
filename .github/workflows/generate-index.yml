name: Generate question index

on:
  push:
    paths:
      - 'questions/**/*.json'
      - 'scripts/generate-index.mjs'
      - '.github/workflows/generate-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate index
        run: node scripts/generate-index.mjs

      - name: Commit generated index
        run: |
          if [ -z "$(git status --porcelain -- index.json)" ]; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: regenerate question index"
          git pull --rebase
          git push
