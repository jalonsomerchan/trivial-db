name: Generate categories

on:
  push:
    paths:
      - 'questions/**/*.json'
      - 'scripts/generate-categories.mjs'
      - '.github/workflows/generate-categories.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-categories:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate categories
        run: node scripts/generate-categories.mjs

      - name: Commit generated categories
        run: |
          if [ -z "$(git status --porcelain -- categories)" ]; then
            echo "No category changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add categories
          git commit -m "chore: regenerate categories"
          git pull --rebase
          git push
